when:
  - event: [push, pull_request]

steps:
  # ── CI: type-check (all branches, push + PR) ──

  - name: type-check
    image: node:22-slim
    commands:
      - npm install
      - npm run type-check

  # ── Deploy: Docker image via BuildKit (push to main only) ──

  - name: build-and-restart
    image: moby/buildkit:v0.21.1
    when:
      - event: push
        branch: main
    commands:
      - >
        buildctl
        --addr tcp://buildkitd.infra.svc.cluster.local:1234
        build
        --frontend dockerfile.v0
        --local context=.
        --local dockerfile=.
        --output type=image,name=registry.infra.svc.cluster.local:5000/cassandra-portal:latest,push=true,registry.insecure=true
      - |
        TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
        APISERVER=https://kubernetes.default.svc
        NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        wget -qO- \
          --header="Authorization: Bearer $TOKEN" \
          --header="Content-Type: application/strategic-merge-patch+json" \
          --method=PATCH \
          --body-data="{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"kubectl.kubernetes.io/restartedAt\":\"$NOW\"}}}}}" \
          --no-check-certificate \
          "$APISERVER/apis/apps/v1/namespaces/production/deployments/cassandra-portal"
