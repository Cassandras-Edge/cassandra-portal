when:
  - event: [push, pull_request]

steps:
  # ── CI: type-check (all branches, push + PR) ──

  - name: type-check
    image: node:22-slim
    commands:
      - npm install
      - npm run type-check

  # ── Deploy: Docker image via BuildKit (push to main only) ──

  - name: build-and-restart
    image: moby/buildkit:v0.21.1
    when:
      - event: push
        branch: main
    commands:
      - >
        buildctl
        --addr tcp://buildkitd.infra.svc.cluster.local:1234
        build
        --frontend dockerfile.v0
        --local context=.
        --local dockerfile=.
        --output type=image,name=registry.infra.svc.cluster.local:5000/cassandra-portal:latest,push=true,registry.insecure=true
      - |
        apk add --no-cache curl
        TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
        NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        curl -sk -X PATCH \
          -H "Authorization: Bearer $TOKEN" \
          -H "Content-Type: application/strategic-merge-patch+json" \
          -d "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"kubectl.kubernetes.io/restartedAt\":\"$NOW\"}}}}}" \
          "https://kubernetes.default.svc/apis/apps/v1/namespaces/production/deployments/portal"

  - name: notify-discord
    image: alpine/curl
    when:
      - status: [success, failure]
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        if [ "$CI_PIPELINE_STATUS" = "success" ]; then
          COLOR=3066993
          EMOJI="✅"
        else
          COLOR=15158332
          EMOJI="❌"
        fi
        curl -sf -H "Content-Type: application/json" \
          -d "{\"embeds\":[{\"title\":\"$EMOJI $CI_REPO #$CI_PIPELINE_NUMBER\",\"description\":\"**Status:** $CI_PIPELINE_STATUS\n**Branch:** $CI_COMMIT_BRANCH\n**Commit:** \`$(echo $CI_COMMIT_SHA | cut -c1-7)\`\",\"color\":$COLOR,\"url\":\"$CI_PIPELINE_URL\"}]}" \
          "$DISCORD_WEBHOOK_URL"
