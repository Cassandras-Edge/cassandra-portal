when:
  - event: [push, pull_request]

steps:
  # ── CI: type-check (all branches, push + PR) ──

  - name: type-check
    image: node:22-slim
    commands:
      - npm install
      - npm run type-check

  # ── Deploy: Docker image via BuildKit (push to main only) ──

  - name: build
    image: moby/buildkit:v0.21.1
    when:
      - event: push
        branch: main
    commands:
      - >
        buildctl
        --addr tcp://buildkitd.infra.svc.cluster.local:1234
        build
        --frontend dockerfile.v0
        --local context=.
        --local dockerfile=.
        --output type=image,name=172.20.0.161:30500/cassandra-portal:latest,push=true,registry.insecure=true

  - name: restart
    image: bitnami/kubectl:latest
    when:
      - event: push
        branch: main
    commands:
      - kubectl rollout restart deployment cassandra-portal -n production
